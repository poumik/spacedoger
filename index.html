<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Dodger</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400&display=swap" rel="stylesheet">
    <style>
        canvas {
            border: 2px solid #00FFFF;
            background: #000033;
            box-shadow: 0 0 10px #00FFFF;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #000011;
            overflow: hidden;
        }
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00FFFF;
            font-family: 'Orbitron', Arial, sans-serif;
            font-size: 24px;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00FFFF;
            border-radius: 5px;
            box-shadow: 0 0 10px #00FFFF;
            transition: transform 0.2s ease;
        }
        #score.updated {
            transform: scale(1.1);
        }
        #highScores {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #00FFFF;
            font-family: 'Orbitron', Arial, sans-serif;
            font-size: 18px;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00FFFF;
            border-radius: 5px;
            box-shadow: 0 0 10px #00FFFF;
            text-align: right;
        }
        #pauseButton {
            position: absolute;
            top: 50px;
            left: 10px;
            color: #00FFFF;
            font-family: 'Orbitron', Arial, sans-serif;
            font-size: 16px;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00FFFF;
            border-radius: 5px;
            box-shadow: 0 0 10px #00FFFF;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        #pauseButton:hover {
            background: rgba(0, 255, 255, 0.2);
        }
        #startButton {
            position: absolute;
            color: #00FFFF;
            font-family: 'Orbitron', Arial, sans-serif;
            font-size: 24px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00FFFF;
            border-radius: 5px;
            box-shadow: 0 0 10px #00FFFF;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        #startButton:hover {
            background: rgba(0, 255, 255, 0.2);
        }
        #soundButton {
            position: absolute;
            top: 90px;
            left: 10px;
            color: #00FFFF;
            font-family: 'Orbitron', Arial, sans-serif;
            font-size: 16px;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00FFFF;
            border-radius: 5px;
            box-shadow: 0 0 10px #00FFFF;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        #soundButton:hover {
            background: rgba(0, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <div id="highScores">High Scores:<br>Loading...</div>
    <button id="pauseButton">Pause</button>
    <button id="startButton">Start Game</button>
    <button id="soundButton">Sound: ON</button>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const highScoresDisplay = document.getElementById('highScores');
        const pauseButton = document.getElementById('pauseButton');
        const startButton = document.getElementById('startButton');
        const soundButton = document.getElementById('soundButton');

        // Audio Context Setup
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isSoundOn = true;
        let bgMusicOscillator = null;

        // Background Music (looping hum with melody)
        function startBackgroundMusic() {
            if (!isSoundOn || bgMusicOscillator) return;
            bgMusicOscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            bgMusicOscillator.type = 'sine';
            bgMusicOscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            bgMusicOscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            bgMusicOscillator.start();

            setInterval(() => {
                if (isSoundOn && !isPaused && !gameOver) {
                    bgMusicOscillator.frequency.setValueAtTime(200, audioCtx.currentTime);
                    setTimeout(() => bgMusicOscillator.frequency.setValueAtTime(100, audioCtx.currentTime), 200);
                }
            }, 2000);
        }

        function stopBackgroundMusic() {
            if (bgMusicOscillator) {
                bgMusicOscillator.stop();
                bgMusicOscillator = null;
            }
        }

        // Laser Shot Sound (high-pitched "pew")
        function playLaserSound() {
            if (!isSoundOn) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // Explosion Sound (noise burst)
        function playExplosionSound() {
            if (!isSoundOn) return;
            const bufferSize = audioCtx.sampleRate * 0.3;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // White noise
            }
            const source = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();
            source.buffer = buffer;
            gain.gain.setValueAtTime(0.7, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
        }

        // Alien Laser Sound (sharp "zap")
        function playAlienLaserSound() {
            if (!isSoundOn) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // Game Over Sound (descending tones)
        function playGameOverSound() {
            if (!isSoundOn) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 1);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        let lastTime = 0;
        let frameCount = 0;
        let fps = 0;
        let totalObjects = 0;
        let gameStarted = true;
        let gameOver = true;

        const ship = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            width: 30,
            height: 40,
            speed: 3,
            dx: 0,
            dy: 0
        };

        let lasers = [];
        const laserSpeed = -5;

        let asteroids = [];
        const asteroidSpeed = 1;
        let score = 0;

        let alienShips = [];
        let alienLasers = [];
        let motherships = [];
        const alienLaserSpeed = 3;

        let explosions = [];
        let totalParticles = 0;
        const maxParticles = 50;

        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height
            });
        }

        let isPaused = false;

        let rightPressed = false;
        let leftPressed = false;
        let upPressed = false;
        let downPressed = false;
        let spacePressed = false;

        document.addEventListener('keydown', keyDownHandler);
        document.addEventListener('keyup', keyUpHandler);
        pauseButton.addEventListener('click', togglePause);
        startButton.addEventListener('click', () => {
            gameOver = false;
            startButton.style.display = 'none';
            pauseButton.style.display = 'block';
            soundButton.style.display = 'block'; // Show sound button on start
            ship.x = canvas.width / 2;
            ship.y = canvas.height - 50;
            ship.dx = 0;
            ship.dy = 0;
            asteroids = [];
            lasers = [];
            alienShips = [];
            alienLasers = [];
            motherships = [];
            explosions = [];
            totalParticles = 0;
            totalObjects = 0;
            score = 0;
            scoreDisplay.textContent = `Score: ${score}`;
            if (isSoundOn) startBackgroundMusic(); // Start background music if sound is on
        });
        soundButton.addEventListener('click', toggleSound);

        function keyDownHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = true;
            if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = true;
            if (e.key === 'Up' || e.key === 'ArrowUp') upPressed = true;
            if (e.key === 'Down' || e.key === 'ArrowDown') downPressed = true;
            if (e.key === ' ' || e.key === 'Spacebar') spacePressed = true;
        }

        function keyUpHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = false;
            if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = false;
            if (e.key === 'Up' || e.key === 'ArrowUp') upPressed = false;
            if (e.key === 'Down' || e.key === 'ArrowDown') downPressed = false;
            if (e.key === ' ' || e.key === 'Spacebar') spacePressed = false;
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseButton.textContent = isPaused ? 'Resume' : 'Pause';
            if (isPaused && isSoundOn) {
                stopBackgroundMusic();
            } else if (!isPaused && isSoundOn) {
                startBackgroundMusic();
                requestAnimationFrame(update);
            }
        }

        function toggleSound() {
            isSoundOn = !isSoundOn;
            soundButton.textContent = isSoundOn ? 'Sound: ON' : 'Sound: OFF';
            if (isSoundOn && !isPaused && !gameOver) {
                startBackgroundMusic();
            } else {
                stopBackgroundMusic();
            }
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);

            ctx.beginPath();
            ctx.moveTo(0, -ship.height / 2);
            ctx.lineTo(-ship.width / 2, ship.height / 2);
            ctx.lineTo(-ship.width / 4, ship.height / 2 - 5);
            ctx.lineTo(0, -ship.height / 4);
            ctx.lineTo(ship.width / 4, ship.height / 2 - 5);
            ctx.lineTo(ship.width / 2, ship.height / 2);
            ctx.closePath();
            const gradient = ctx.createLinearGradient(0, -ship.height / 2, 0, ship.height / 2);
            gradient.addColorStop(0, '#00FFFF');
            gradient.addColorStop(1, '#008888');
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.beginPath();
            const flameBase = ship.height / 2;
            let flameLength = 12 + Math.sin(Date.now() * 0.01) * 2;
            let flameWidth = ship.width / 4;
            let opacity = 0.7 + Math.sin(Date.now() * 0.01) * 0.2;
            
            if (upPressed) {
                flameLength = 20 + Math.sin(Date.now() * 0.02) * 5;
                flameWidth = ship.width / 3;
                opacity = 0.9 + Math.sin(Date.now() * 0.02) * 0.1;
            }

            ctx.moveTo(-flameWidth, flameBase);
            ctx.lineTo(0, flameBase + flameLength);
            ctx.lineTo(flameWidth, flameBase);
            ctx.closePath();
            ctx.fillStyle = `rgba(255, 165, 0, ${opacity})`;
            ctx.fill();

            ctx.restore();
        }

        class Laser {
            constructor() {
                this.x = ship.x;
                this.y = ship.y - ship.height / 2;
                this.width = 4;
                this.height = 10;
                this.speed = laserSpeed;
                totalObjects += 1;
            }

            draw() {
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(this.x - this.width / 2, this.y, this.width, this.height);
            }

            update() {
                this.y += this.speed;
            }
        }

        class Asteroid {
            constructor() {
                this.x = Math.random() * (canvas.width - 30);
                this.y = -30;
                this.radius = 15 + Math.random() * 15;
                this.speed = 1 + Math.random() * 1;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.points = [];
                const pointsCount = 8;
                for (let i = 0; i < pointsCount; i++) {
                    const angle = (i / pointsCount) * Math.PI * 2;
                    const r = this.radius * (0.8 + Math.random() * 0.4);
                    this.points.push({
                        x: Math.cos(angle) * r,
                        y: Math.sin(angle) * r
                    });
                }
                totalObjects += 1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.beginPath();
                this.points.forEach((point, i) => {
                    if (i === 0) ctx.moveTo(point.x, point.y);
                    else ctx.lineTo(point.x, point.y);
                });
                ctx.closePath();
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                gradient.addColorStop(0, '#A9A9A9');
                gradient.addColorStop(1, '#333333');
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = '#555555';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
                this.rotation += this.rotationSpeed;
            }

            update() {
                this.y += this.speed;
            }
        }

        class AlienShip {
            constructor() {
                this.x = Math.random() * (canvas.width - 40);
                this.y = -20;
                this.width = 40;
                this.height = 30;
                this.speed = 1 + Math.random() * 1;
                this.direction = Math.random() < 0.5 ? -1 : 1;
                this.shootTimer = Math.random() * 3000 + 2000;
                totalObjects += 1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.beginPath();
                ctx.moveTo(0, -this.height / 2);
                ctx.lineTo(-this.width / 2, this.height / 2);
                ctx.lineTo(0, this.height / 4);
                ctx.lineTo(this.width / 2, this.height / 2);
                ctx.closePath();
                ctx.fillStyle = '#4B0082';
                ctx.fill();
                ctx.strokeStyle = '#FF0000';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(0, -this.height / 4, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#FF0000';
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.speed * this.direction;
                this.y += 0.5;
                if (this.x < 0 || this.x > canvas.width) this.direction *= -1;

                this.shootTimer -= 16;
                if (this.shootTimer <= 0 && alienLasers.length < 5) {
                    alienLasers.push(new AlienLaser(this.x, this.y));
                    playAlienLaserSound();
                    this.shootTimer = Math.random() * 3000 + 2000;
                }
            }
        }

        class AlienLaser {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 4;
                this.height = 10;
                this.speed = alienLaserSpeed;
                totalObjects += 1;
            }

            draw() {
                ctx.fillStyle = '#FFFF00';
                ctx.fillRect(this.x - this.width / 2, this.y, this.width, this.height);
            }

            update() {
                this.y += this.speed;
            }
        }

        class Mothership {
            constructor() {
                this.x = Math.random() * (canvas.width - 60);
                this.y = -70;
                this.width = 60;
                this.height = 70;
                this.speed = 3 + Math.random() * 1;
                this.direction = Math.random() < 0.5 ? -1 : 1;
                this.shootTimer = Math.random() * 500 + 500;
                totalObjects += 1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                ctx.beginPath();
                ctx.moveTo(0, -this.height / 2);
                ctx.lineTo(-this.width / 2 + 5, -this.height / 3);
                ctx.lineTo(-this.width / 2, 0);
                ctx.lineTo(-this.width / 3, this.height / 2);
                ctx.lineTo(0, this.height / 2 - 10);
                ctx.lineTo(this.width / 3, this.height / 2);
                ctx.lineTo(this.width / 2, 0);
                ctx.lineTo(this.width / 2 - 5, -this.height / 3);
                ctx.closePath();
                ctx.fillStyle = '#4A0000';
                ctx.fill();
                ctx.strokeStyle = '#FF4500';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(-this.width / 4, -this.height / 3, 5, 0, Math.PI * 2);
                ctx.arc(this.width / 4, -this.height / 3, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#FFFF00';
                ctx.fill();

                ctx.restore();
            }

            update() {
                this.x += this.speed * this.direction;
                this.y += 0.5;
                if (this.x < 0 || this.x > canvas.width) this.direction *= -1;

                this.shootTimer -= 16;
                if (this.shootTimer <= 0 && alienLasers.length < 5) {
                    alienLasers.push(new AlienLaser(this.x - this.width / 4, this.y));
                    alienLasers.push(new AlienLaser(this.x, this.y));
                    alienLasers.push(new AlienLaser(this.x + this.width / 4, this.y));
                    playAlienLaserSound();
                    this.shootTimer = Math.random() * 500 + 500;
                }
            }
        }

        class Explosion {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                this.lifetime = 20;
                const particleCount = Math.min(5, Math.floor((maxParticles - totalParticles) / 2));
                for (let i = 0; i < particleCount; i++) {
                    this.particles.push({
                        x: 0,
                        y: 0,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        size: Math.random() * 2 + 1,
                        life: this.lifetime
                    });
                }
                totalParticles += this.particles.length;
                totalObjects += 1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                for (let p of this.particles) {
                    ctx.fillStyle = `rgba(255, 165, 0, ${p.life / this.lifetime})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            update() {
                for (let p of this.particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                }
                this.lifetime--;
                if (this.lifetime <= 0) {
                    totalParticles -= this.particles.length;
                    totalObjects -= 1;
                }
            }
        }

        function spawnAsteroid() {
            if (asteroids.length < 10) {
                asteroids.push(new Asteroid());
            }
        }

        function spawnAlienShip() {
            if (alienShips.length < 3) {
                alienShips.push(new AlienShip());
            }
        }

        function spawnMothership() {
            if (motherships.length < 1) {
                motherships.push(new Mothership());
            }
        }

        let lastShot = 0;
        const shotDelay = 200;
        function shootLaser() {
            const now = Date.now();
            if (spacePressed && now - lastShot >= shotDelay && lasers.length < 5) {
                lasers.push(new Laser());
                playLaserSound();
                lastShot = now;
            }
        }

        function checkShipCollision() {
            for (let asteroid of asteroids) {
                const distX = Math.abs(asteroid.x - ship.x);
                const distY = Math.abs(asteroid.y - ship.y);
                if (distX < ship.width / 2 + asteroid.radius &&
                    distY < ship.height / 2 + asteroid.radius) {
                    return true;
                }
            }
            for (let alien of alienShips) {
                const distX = Math.abs(alien.x - ship.x);
                const distY = Math.abs(alien.y - ship.y);
                if (distX < ship.width / 2 + alien.width / 2 &&
                    distY < ship.height / 2 + alien.height / 2) {
                    return true;
                }
            }
            for (let mothership of motherships) {
                const distX = Math.abs(mothership.x - ship.x);
                const distY = Math.abs(mothership.y - ship.y);
                if (distX < ship.width / 2 + mothership.width / 2 &&
                    distY < ship.height / 2 + mothership.height / 2) {
                    return true;
                }
            }
            for (let laser of alienLasers) {
                const distX = Math.abs(laser.x - ship.x);
                const distY = Math.abs(laser.y - ship.y);
                if (distX < ship.width / 2 + laser.width / 2 &&
                    distY < ship.height / 2 + laser.height / 2) {
                    return true;
                }
            }
            return false;
        }

        function checkLaserCollision() {
            let hit = false;
            lasers = lasers.filter(l => {
                hit = false;
                asteroids = asteroids.filter(a => {
                    const distX = Math.abs(l.x - a.x);
                    const distY = Math.abs(l.y - a.y);
                    if (distX < a.radius && distY < a.radius) {
                        if (explosions.length < 5 && totalParticles < maxParticles) {
                            explosions.push(new Explosion(a.x, a.y));
                            playExplosionSound();
                        }
                        score += 10;
                        scoreDisplay.textContent = `Score: ${score}`;
                        scoreDisplay.classList.add('updated');
                        setTimeout(() => scoreDisplay.classList.remove('updated'), 200);
                        hit = true;
                        return false;
                    }
                    return true;
                });
                alienShips = alienShips.filter(al => {
                    const distX = Math.abs(l.x - al.x);
                    const distY = Math.abs(l.y - al.y);
                    if (distX < al.width / 2 && distY < al.height / 2) {
                        if (explosions.length < 5 && totalParticles < maxParticles) {
                            explosions.push(new Explosion(al.x, al.y));
                            playExplosionSound();
                        }
                        score += 25;
                        scoreDisplay.textContent = `Score: ${score}`;
                        scoreDisplay.classList.add('updated');
                        setTimeout(() => scoreDisplay.classList.remove('updated'), 200);
                        hit = true;
                        return false;
                    }
                    return true;
                });
                motherships = motherships.filter(m => {
                    const distX = Math.abs(l.x - m.x);
                    const distY = Math.abs(l.y - m.y);
                    if (distX < m.width / 2 && distY < m.height / 2) {
                        if (explosions.length < 5 && totalParticles < maxParticles) {
                            explosions.push(new Explosion(m.x, m.y));
                            playExplosionSound();
                        }
                        score += 100;
                        scoreDisplay.textContent = `Score: ${score}`;
                        scoreDisplay.classList.add('updated');
                        setTimeout(() => scoreDisplay.classList.remove('updated'), 200);
                        hit = true;
                        return false;
                    }
                    return true;
                });
                return !hit;
            });
        }

        function updateHighScores() {
            let highScores = JSON.parse(localStorage.getItem('highScores')) || [];
            highScores.push(score);
            highScores.sort((a, b) => b - a);
            highScores = highScores.slice(0, 5);
            localStorage.setItem('highScores', JSON.stringify(highScores));
            displayHighScores(highScores);
        }

        function displayHighScores(scores) {
            highScoresDisplay.innerHTML = 'High Scores:<br>' +
                (scores.length ? scores.map((s, i) => `${i + 1}. ${s}`).join('<br>') : 'No scores yet');
        }

        displayHighScores(JSON.parse(localStorage.getItem('highScores')) || []);

        function update(timestamp) {
            if (isPaused) return;

            if (!timestamp) timestamp = performance.now();
            frameCount++;
            const delta = timestamp - lastTime;
            if (delta >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = timestamp;
                console.log(`FPS: ${fps}, Particles: ${totalParticles}, Objects: ${totalObjects}`);
                totalObjects = 0;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FFFFFF';
            stars.forEach(star => ctx.fillRect(star.x, star.y, 1, 1));

            if (!gameOver) {
                if (rightPressed && ship.x < canvas.width - ship.width / 2) ship.dx = ship.speed;
                else if (leftPressed && ship.x > ship.width / 2) ship.dx = -ship.speed;
                else ship.dx = 0;

                if (upPressed && ship.y > ship.height / 2) ship.dy = -ship.speed;
                else if (downPressed && ship.y < canvas.height - ship.height) ship.dy = ship.speed;
                else ship.dy = 0;

                ship.x += ship.dx;
                ship.y += ship.dy;

                asteroids = asteroids.filter(a => {
                    a.update();
                    a.draw();
                    totalObjects += 1;
                    return a.y <= canvas.height + a.radius;
                }).map(a => {
                    if (a.y > canvas.height + a.radius) score += 1;
                    return a;
                });
                if (asteroids.length > 0) {
                    scoreDisplay.textContent = `Score: ${score}`;
                    scoreDisplay.classList.add('updated');
                    setTimeout(() => scoreDisplay.classList.remove('updated'), 200);
                }

                alienShips = alienShips.filter(alien => {
                    alien.update();
                    alien.draw();
                    totalObjects += 1;
                    return alien.y <= canvas.height + alien.height;
                });

                motherships = motherships.filter(m => {
                    m.update();
                    m.draw();
                    totalObjects += 1;
                    return m.y <= canvas.height + m.height;
                });

                lasers = lasers.filter(l => {
                    l.update();
                    l.draw();
                    totalObjects += 1;
                    return l.y >= 0;
                });

                alienLasers = alienLasers.filter(al => {
                    al.update();
                    al.draw();
                    totalObjects += 1;
                    return al.y <= canvas.height;
                });

                explosions = explosions.filter(e => {
                    e.update();
                    e.draw();
                    return e.lifetime > 0;
                });

                drawShip();

                if (Math.random() < 0.02) spawnAsteroid();
                if (Math.random() < 0.002) spawnAlienShip();
                if (Math.random() < 0.001 && motherships.length < 1) spawnMothership();

                shootLaser();

                checkLaserCollision();
                if (checkShipCollision()) {
                    updateHighScores();
                    gameOver = true;
                    startButton.style.display = 'block';
                    pauseButton.style.display = 'none';
                    soundButton.style.display = 'none';
                    stopBackgroundMusic();
                    playGameOverSound();
                }
            } else {
                asteroids.forEach(a => a.draw());
                alienShips.forEach(alien => alien.draw());
                motherships.forEach(m => m.draw());
                lasers.forEach(l => l.draw());
                alienLasers.forEach(al => al.draw());
                explosions.forEach(e => e.draw());
                drawShip();

                ctx.font = "bold 60px 'Orbitron', Arial, sans-serif";
                ctx.fillStyle = "#00FFFF";
                ctx.textAlign = "center";
                ctx.shadowColor = "#00FFFF";
                ctx.shadowBlur = 10;
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);
                
                ctx.font = "bold 24px 'Orbitron', Arial, sans-serif";
                ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2);
                ctx.fillText("Press Start to Play Again", canvas.width / 2, canvas.height / 2 + 40);
                ctx.shadowBlur = 0;

                startButton.style.top = `${canvas.height / 2 + 110}px`;
                startButton.style.left = '50%';
                startButton.style.transform = 'translateX(-50%)';
            }

            requestAnimationFrame(update);
        }

        requestAnimationFrame(update);
    </script>
</body>
</html>
